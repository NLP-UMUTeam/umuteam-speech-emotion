<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <!-- Title -->
    <title>UMUTeam Speech Emotion</title>

    
    <!-- Manifest. Our PWA -->
    <link rel="manifest" href="manifest.json">
    
    
    <!-- Some specific vendor suggestions --> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="UMUTeam | Speech Emotion">
    <link rel="apple-touch-icon" href="icons/android-chrome-192x192.png">
    
    <meta name="msapplication-TileImage" content="icons/android-chrome-192x192.png">
    <meta name="msapplication-TileColor" content="#8D1300">
    
    
    <!-- Icon -->
    <link rel="icon" href="icons/favicon.ico">
    <link rel="icon" href="icons/favicon-32x32.png" sizes="32x32" />
    
    
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Nunito+Sans:300,300i,400,700&display=swap" rel="stylesheet">


    
    <!-- Specific stylesheets -->
    <link rel="stylesheet" type="text/css" href="/static/css/flexboxgrid.min.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/vex.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/vex-theme-plain.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/shell.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/style.css" />
    <link rel="stylesheet" type="text/css" href="/static/css/desktop.css" media="(min-width: 768px)" />
    
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous" />
    <link rel="stylesheet" type="text/css" href="/static/css/select2.min.css" />
  
</head>

<body>

    <!-- API messages -->
    <div class="working-box"></div>


    <!-- Wrapper -->
    <div id="wrapper">
    
        <header>
            <h1>UMUTeam Speech Emotion<small>Multimodal Speech Analysis</small></h1>
        </header>


        <main>
            <form name="emotion">
                
                <fieldset>
                    <legend>Step 1. Configuration</legend>
                    <div class="row">
                        <div class="col-xs-12 col-md-4">
                            <label for="language">Language</label>
                            <select id="language" name="language" class="form-control">
                                <option value="es" selected>Spanish (es)</option>
                                <option value="en">English (en)</option>
                            </select>
                        </div>
                        
                        <div class="col-xs-12 col-md-4">
                            <label for="mode">Inference</label>
                            <select id="mode" name="mode" class="form-control">
                                <option value="text">Text (Whisper + clasificador)</option>
                                <option value="audio">Audio (Wav2Vec2-BERT)</option>
                                <option value="concat">Multimodal: concat (audio + texto)</option>
                                <option value="mean">Multimodal: mean</option>
                                <option value="multihead">Multimodal: multi-head</option>
                            </select>
                        </div>
                        
                        
                        <div class="col-xs-12 col-md-4">
                            <label for="device">Device</label>
                            <select id="device" name="device" class="form-control">
                              <option value="auto">Auto (CPU / GPU if any)</option>
                              <option value="cpu">CPU</option>
                              <option value="cuda:0">GPU (cuda:0)</option>
                            </select>
                        </div>
                    </div>
                </fieldset>
                
                
                <fieldset>
                    <legend>Step 2. Input</legend>
                    <div class="row">
                        <div class="col-xs-12 col-md-4">
                            <div id="drop-zone">
                                <p>Option 1. Drag and drop an audio file</p>
                            </div>
                            <input type="file" id="audio-input" accept="audio/*" hidden />
                            <p id="file-name"></p>
                        </div>
                        
                        <div class="col-xs-12 col-md-4">
                            <label>Option 2. Record your own audio</label>
                            <audio id="audio" controls></audio>
                            <input type="hidden" name="audio" value="" />
                            <button id="play" type="button" class="record"></button>
                        </div>
                        
                        <div class="col-xs-12 col-md-4">
                            <label>Option 3. Write your own text</label>
                            <textarea name="transcription">Estoy muy feliz</textarea>
                        </div>
                    </div>
                    
                </fieldset>


                <button type="submit">
                    Get emotions!
                </button>
                
                
                <!-- Results -->
                <div class="row">
                    <div class="col-xs-12">
                        <section class="results">
                            <div class="row">
                                <div class="col-xs-12">
                                    <label class="title">Results</label>
                                    <div class="text">
                                        <div class="ph"></div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </form>
        </main>
    
    </div>
    
    
    <!-- Loader -->
    <div class="loader">
        <svg viewBox="0 0 32 32" width="32" height="32">
            <circle id="spinner" cx="16" cy="16" r="14" fill="none"></circle>
        </svg>
    </div>  
  
  
    <!-- Javascripts loaded at the bottom -->
    <script src="/static/js/vendor/jquery-3.4.1.min.js"></script>
    <script src="/static/js/vendor/select2.min.js"></script>
    <script src="/static/js/vendor/vex.combined.min.js"></script>
    <script src="/static/js/audio.js"></script>

</body>
</html>
